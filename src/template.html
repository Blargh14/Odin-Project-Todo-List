<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two do's?</title>
</head>

<body>
    <dialog id="newProjectContainer">
        <form id="newProjectForm">
            <label for="projectTitle">Enter project title:</label><br>
            <input id="projectTitle" name=projectTitle type="text">
            <input id="add-button" type="submit" value="Add">
        </form>
        <button commandfor="newProjectContainer" command="close">Close</button>
    </dialog>
    <div id="container">
        <div id="left">
            <h2>Projects</h2>
            <div id="projectsContainer"></div>
            <button class="project" id="addProject" command="show-modal" commandfor="newProjectContainer">+</button>
        </div>
        <div id="right">
            <h2>Todo:</h2>
            <div id="content"></div>
        </div>
    </div>
</body>

</html>
